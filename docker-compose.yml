services:
  postgres:
    image: postgres:15-alpine
    container_name: brewmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brewmaster}
      POSTGRES_USER: ${POSTGRES_USER:-brewmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brewmaster} -d ${POSTGRES_DB:-brewmaster}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brewmaster-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-brewmaster}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-brewmaster}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-28800000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    ports:
      - "8080:8080"
    profiles:
      - full

volumes:
  postgres_data:
